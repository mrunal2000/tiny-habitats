<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hang</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:#f3efe8;
      font-family:ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      color:#2a2a2a;
      overflow-x:hidden;
    }

    .scene {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:40px 0 64px;
      gap:24px;
    }

    h1 {
      font-size:11px;
      letter-spacing:0.16em;
      text-transform:lowercase;
      color:rgba(30,30,30,0.45);
      font-weight:400;
      padding:0 32px;
    }

    /* Full-bleed horizontal scroll wall */
    .wall {
      flex:1;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-behavior:smooth;
      scrollbar-width:thin;
      scrollbar-color:rgba(0,0,0,0.2) transparent;
      cursor:grab;
    }
    .wall.dragging {
      cursor:grabbing;
      scroll-behavior:auto;
      user-select:none;
    }
    .wall.dragging * { pointer-events:none; }

    .track {
      position:relative;
      display:inline-block;
      min-width:100%;
      padding:0 48px 32px;
      background:
        linear-gradient(90deg, #f3efe8 0%, transparent 48px),
        linear-gradient(270deg, #f3efe8 0%, transparent 48px);
      background-attachment:local;
    }

    .rail {
      position:relative;
      height:18px;
      border-radius:4px;
      background:linear-gradient(180deg, #de6860 0%, #c44e46 18%, #b03c36 55%, #963830 100%);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.11),
        inset 0 1px 0 rgba(255,255,255,0.32),
        inset 0 -2px 0 rgba(0,0,0,0.14);
    }
    .rail::after {
      content:'';
      position:absolute;
      left:0;
      right:0;
      bottom:-3px;
      height:5px;
      border-radius:0 0 4px 4px;
      background:linear-gradient(180deg, rgba(0,0,0,0.18), transparent);
      pointer-events:none;
    }

    .hooks {
      display:flex;
      flex-wrap:nowrap;
      margin-top:0;
    }

    .slot {
      flex:0 0 440px;
      width:440px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:min(78vh, 720px);
    }

    /* Turned ball-end peg — SVG for proper cylinder + sphere shading */
    .peg {
      position:relative;
      z-index:6;
      width:32px;
      height:58px;
      margin-top:-6px;
      filter:drop-shadow(2px 5px 7px rgba(0,0,0,0.22));
    }
    .peg-svg {
      display:block;
      width:100%;
      height:100%;
    }

    .hang-stage {
      position:relative;
      width:380px;
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-top:2px;
      min-height:420px;
    }

    .bag-zone {
      position:relative;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      transform-origin:50% 0;
      z-index:3;
    }
    .bag-zone.has-bag {
      position:absolute;
      left:0;
      right:0;
    }

    .straps {
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      transform-origin:50% 0;
      width:380px;
      height:420px;
      z-index:2;
      pointer-events:none;
      overflow:visible;
    }
    .straps line, .straps path {
      stroke-linecap:round;
      fill:none;
    }

    .wall-shadow {
      position:absolute;
      left:50%;
      transform:translateX(calc(-50% + 32px));
      z-index:0;
      pointer-events:none;
      opacity:0.32;
      filter:blur(16px) brightness(0);
      max-width:340px;
      width:85%;
    }

    .bag-img {
      position:relative;
      z-index:4;
      width:auto;
      max-width:92%;
      height:auto;
      display:block;
      pointer-events:none;
      filter:drop-shadow(0 18px 28px rgba(0,0,0,0.18));
    }

    .floor-shadow {
      position:absolute;
      bottom:12%;
      left:50%;
      transform:translateX(calc(-50% + 24px));
      width:70%;
      height:22px;
      background:radial-gradient(ellipse, rgba(0,0,0,0.22) 0%, transparent 70%);
      filter:blur(8px);
      z-index:1;
      pointer-events:none;
    }

    .bag-meta {
      margin-top:18px;
      text-align:center;
      width:100%;
      z-index:6;
    }
    .bag-meta input {
      font:inherit;
      font-size:10px;
      letter-spacing:0.06em;
      background:transparent;
      border:none;
      outline:none;
      width:100%;
      text-align:center;
      color:#333;
      display:block;
    }
    .bag-meta input::placeholder { color:rgba(0,0,0,0.28); }
    .bag-meta .price { margin-top:5px; color:rgba(0,0,0,0.42); }

    .empty-slot {
      margin-top:52px;
      width:260px;
      aspect-ratio:0.72;
      border:1px dashed rgba(0,0,0,0.13);
      border-radius:4px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:rgba(0,0,0,0.28);
      font-size:10px;
      letter-spacing:0.1em;
      text-transform:lowercase;
      transition:border-color 0.15s, background 0.15s;
    }
    .empty-slot:hover { border-color:rgba(0,0,0,0.28); background:rgba(255,255,255,0.4); }
    .empty-slot.dragover { border-color:rgba(0,0,0,0.38); background:rgba(255,255,255,0.65); }

    .slot-actions {
      margin-top:12px;
      display:flex;
      gap:8px;
      opacity:0;
      transition:opacity 0.15s;
    }
    .slot:hover .slot-actions,
    .slot:focus-within .slot-actions { opacity:1; }
    .slot-actions button {
      font:inherit;
      font-size:9px;
      letter-spacing:0.1em;
      text-transform:lowercase;
      padding:5px 11px;
      border:1px solid rgba(0,0,0,0.12);
      border-radius:4px;
      background:rgba(255,255,255,0.75);
      cursor:pointer;
      color:rgba(0,0,0,0.5);
    }
    .slot-actions button:hover { background:#fff; color:#222; }

    .hint {
      font-size:10px;
      letter-spacing:0.08em;
      color:rgba(0,0,0,0.35);
      padding:0 32px;
      line-height:1.65;
    }
  </style>
</head>
<body>
  <div class="scene">
    <h1>wishlist · hang</h1>
    <div class="wall" id="wall">
      <div class="track" id="track">
        <div class="rail" id="rail"></div>
        <div class="hooks" id="hooks"></div>
      </div>
    </div>
    <p class="hint">drag sideways · drop any bag photo — background is removed automatically · name & price save</p>
  </div>

<script>
const HOOK_INSET = 5;
const PEG_HANG_RATIO = 0.74;
const BAG_DISPLAY = { minH: 260, maxH: 520, maxW: 392, pxScale: 0.92 };

function pegHtml(i) {
  const p = `peg${i}`;
  return `<svg class="peg-svg" viewBox="0 0 32 58" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="${p}-mount" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#a83832"/>
        <stop offset="100%" stop-color="#5e1818"/>
      </linearGradient>
      <linearGradient id="${p}-shaft" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#5e1818"/>
        <stop offset="12%" stop-color="#963830"/>
        <stop offset="30%" stop-color="#d86058"/>
        <stop offset="48%" stop-color="#f08880"/>
        <stop offset="62%" stop-color="#d05850"/>
        <stop offset="82%" stop-color="#a03832"/>
        <stop offset="100%" stop-color="#5e1818"/>
      </linearGradient>
      <linearGradient id="${p}-neck" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c85048"/>
        <stop offset="100%" stop-color="#7a2824"/>
      </linearGradient>
      <radialGradient id="${p}-ball" cx="34%" cy="28%" r="70%">
        <stop offset="0%" stop-color="#ffc8c0"/>
        <stop offset="30%" stop-color="#e87870"/>
        <stop offset="72%" stop-color="#b04038"/>
        <stop offset="100%" stop-color="#5e1818"/>
      </radialGradient>
    </defs>
    <ellipse cx="17" cy="7" rx="11" ry="3.5" fill="#000" opacity="0.06"/>
    <ellipse cx="16" cy="5.5" rx="11" ry="4" fill="url(#${p}-mount)"/>
    <ellipse cx="16" cy="4.2" rx="7" ry="2.4" fill="#c85048"/>
    <ellipse cx="16" cy="3.6" rx="4.5" ry="1.2" fill="#000" opacity="0.12"/>
    <path d="M 10.5 5.5 C 9.8 5.5 9.5 6.2 9.5 7.2 L 9.5 40.5 C 9.5 41.8 10.5 42.5 11.8 42.5 L 20.2 42.5 C 21.5 42.5 22.5 41.8 22.5 40.5 L 22.5 7.2 C 22.5 6.2 22.2 5.5 21.5 5.5 Z" fill="url(#${p}-shaft)"/>
    <path d="M 10.8 7.5 L 10.8 39.5" stroke="#fff" stroke-width="1.4" opacity="0.22" stroke-linecap="round"/>
    <path d="M 21.2 8 L 21.2 39" stroke="#000" stroke-width="1" opacity="0.1" stroke-linecap="round"/>
    <ellipse cx="16" cy="42.5" rx="5.5" ry="2.2" fill="url(#${p}-neck)"/>
    <circle cx="16" cy="50" r="7" fill="url(#${p}-ball)"/>
    <ellipse cx="13.6" cy="48" rx="2.4" ry="1.5" fill="#fff" opacity="0.38"/>
    <ellipse cx="16" cy="57.2" rx="5.5" ry="1.4" fill="#000" opacity="0.12"/>
  </svg>`;
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function measureBodyBounds(c) {
  const w = c.width, h = c.height;
  const d = c.getContext('2d').getImageData(0, 0, w, h).data;
  const skipTop = Math.floor(h * 0.14);
  let minX = w, maxX = 0, minY = h, maxY = 0, n = 0;
  for (let y = skipTop; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (d[(y * w + x) * 4 + 3] > 40) {
        minX = Math.min(minX, x);
        maxX = Math.max(maxX, x);
        minY = Math.min(minY, y);
        maxY = Math.max(maxY, y);
        n++;
      }
    }
  }
  if (!n) return { bodyWidth: w, bodyHeight: h };
  return { bodyWidth: maxX - minX + 1, bodyHeight: maxY - minY + 1 };
}

function bagDisplaySize(attach) {
  const bw = attach.bodyWidth || attach.width;
  const bh = attach.bodyHeight || attach.height;
  const bulk = Math.max(bh, bw * 0.78);
  const aspect = attach.width / attach.height;
  let h = clamp(bulk / BAG_DISPLAY.pxScale, BAG_DISPLAY.minH, BAG_DISPLAY.maxH);
  let w = h * aspect;
  if (w > BAG_DISPLAY.maxW) {
    w = BAG_DISPLAY.maxW;
    h = w / aspect;
  }
  return { width: Math.round(w), height: Math.round(h) };
}

function enrichAttachFromImage(img, attach) {
  if (attach?.bodyWidth && attach?.bodyHeight) return attach;
  if (!img.naturalWidth) return attach;
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  return { ...attach, ...measureBodyBounds(c) };
}

function getPegTipY(stage) {
  const peg = stage.querySelector('.peg');
  if (!peg) return 40;
  return peg.offsetTop + peg.offsetHeight * PEG_HANG_RATIO;
}

function bagImgOffsetX(img, attach) {
  const scale = attach.width > 0 ? img.offsetWidth / attach.width : 1;
  const hangX = (attach.cx ?? attach.width / 2) * scale;
  return (img.offsetWidth / 2) - hangX;
}

function layoutHang(stage, zone, img, attach, straps) {
  const pegTipY = getPegTipY(stage);
  if (straps) straps.style.top = `${pegTipY}px`;

  if (!img || !attach) {
    zone.classList.remove('has-bag');
    zone.style.top = '';
    return;
  }

  zone.classList.add('has-bag');
  zone.style.top = `${pegTipY}px`;

  const size = bagDisplaySize(attach);
  img.style.width = `${size.width}px`;

  const scale = attach.width > 0 ? img.offsetWidth / attach.width : 1;
  const hangOffset = attach.top * scale - HOOK_INSET;
  img.style.marginTop = `${-hangOffset}px`;
  img.style.marginLeft = `${bagImgOffsetX(img, attach)}px`;

  const wallShadow = zone.querySelector('.wall-shadow');
  if (wallShadow) {
    wallShadow.style.width = `${Math.round(size.width * 0.88)}px`;
    wallShadow.style.marginLeft = img.style.marginLeft;
    const bodyTop = hangOffset + Math.max(attach.top * scale, 24) + (attach.height || 200) * scale * 0.1;
    wallShadow.style.top = `${bodyTop}px`;
  }
}

const NUM_HOOKS = 12;
const STORAGE_KEY = 'hang-wishlist-v2';
const wallEl = document.getElementById('wall');
const hooksEl = document.getElementById('hooks');
const railEl = document.getElementById('rail');
const slots = [];

function getPx(d, x, y, w) {
  const i = (y * w + x) * 4;
  return [d[i], d[i+1], d[i+2], d[i+3]];
}

function colorDist(r, g, b, bg) {
  const dr = r - bg[0], dg = g - bg[1], db = b - bg[2];
  return Math.sqrt(dr*dr + dg*dg + db*db);
}

function avgColor(samples) {
  const s = [0,0,0];
  samples.forEach(c => { s[0]+=c[0]; s[1]+=c[1]; s[2]+=c[2]; });
  const n = samples.length;
  return [s[0]/n, s[1]/n, s[2]/n];
}

function sampleEdgeColors(d, w, h) {
  const samples = [];
  const step = Math.max(1, Math.floor(Math.min(w, h) / 24));
  for (let x = 0; x < w; x += step) {
    samples.push(getPx(d, x, 0, w));
    samples.push(getPx(d, x, h-1, w));
  }
  for (let y = 0; y < h; y += step) {
    samples.push(getPx(d, 0, y, w));
    samples.push(getPx(d, w-1, y, w));
  }
  return avgColor(samples);
}

function removeBackground(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  const w = c.width, h = c.height;
  const bg = sampleEdgeColors(d, w, h);
  const tol = 38;
  const soft = 42;

  for (let i = 0; i < d.length; i += 4) {
    const dist = colorDist(d[i], d[i+1], d[i+2], bg);
    if (dist < tol) d[i+3] = 0;
    else if (dist < tol + soft) d[i+3] = Math.round(((dist - tol) / soft) * 255);
  }

  ctx.putImageData(id, 0, 0);
  return trimCanvas(c);
}

function trimCanvas(c) {
  const ctx = c.getContext('2d');
  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  let minX = c.width, minY = c.height, maxX = 0, maxY = 0;
  for (let y = 0; y < c.height; y++) {
    for (let x = 0; x < c.width; x++) {
      if (d[(y * c.width + x) * 4 + 3] > 12) {
        minX = Math.min(minX, x); maxX = Math.max(maxX, x);
        minY = Math.min(minY, y); maxY = Math.max(maxY, y);
      }
    }
  }
  if (maxX < minX) return c;
  const pad = 8;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(c.width - 1, maxX + pad);
  maxY = Math.min(c.height - 1, maxY + pad);
  const tw = maxX - minX + 1, th = maxY - minY + 1;
  const out = document.createElement('canvas');
  out.width = tw; out.height = th;
  out.getContext('2d').drawImage(c, minX, minY, tw, th, 0, 0, tw, th);
  return out;
}

function findAttachPoints(c) {
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const id = ctx.getImageData(0, 0, w, h);
  const d = id.data;
  const scanH = Math.max(4, Math.floor(h * 0.08));
  let minX = w, maxX = 0, sumX = 0, count = 0, topY = h;

  for (let y = 0; y < scanH; y++) {
    for (let x = 0; x < w; x++) {
      if (d[(y * w + x) * 4 + 3] > 40) {
        minX = Math.min(minX, x);
        maxX = Math.max(maxX, x);
        sumX += x;
        count++;
        topY = Math.min(topY, y);
      }
    }
  }

  const cxCol = Math.floor(w / 2);
  const colW = Math.max(3, Math.floor(w * 0.07));
  for (let y = 0; y < scanH; y++) {
    for (let x = cxCol - colW; x <= cxCol + colW; x++) {
      if (x >= 0 && x < w && d[(y * w + x) * 4 + 3] > 40) {
        topY = Math.min(topY, y);
      }
    }
  }

  if (!count) return { left: w*0.3, right: w*0.7, top: 0, cx: w/2, width: w, height: h, ...measureBodyBounds(c) };
  const cx = sumX / count;
  const span = maxX - minX;
  return {
    left: minX + span * 0.12,
    right: maxX - span * 0.12,
    top: topY,
    cx,
    width: w,
    height: h,
    ...measureBodyBounds(c),
  };
}

function hangifyImage(c) {
  const w = c.width, h = c.height;
  const pad = Math.round(h * 0.04);
  const out = document.createElement('canvas');
  out.width = w + pad * 2;
  out.height = h + pad;
  const ctx = out.getContext('2d');

  for (let y = 0; y < h; y++) {
    const t = y / h;
    const pinch = t < 0.1 ? 0.95 + t * 0.45 : 1;
    const swell = 1 + Math.pow(t, 1.6) * 0.11;
    const bow = 1 + Math.sin(t * Math.PI) * 0.018;
    const scaleX = pinch * swell * bow;
    const rowW = w * scaleX;
    const xOff = pad + (w - rowW) / 2;
    const depth = 1 - Math.pow(Math.abs(t - 0.48), 1.4) * 0.07 - t * 0.05;

    ctx.drawImage(c, 0, y, w, 1, xOff, y + pad * 0.15, rowW, 1);
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = `rgba(25,18,12,${(1-depth)*0.38})`;
    ctx.fillRect(xOff, y + pad * 0.15, rowW, 1);
    ctx.globalCompositeOperation = 'source-over';
  }

  const g = ctx.createLinearGradient(out.width*0.3, 0, out.width*0.7, 0);
  g.addColorStop(0, 'rgba(255,255,255,0)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.12)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.globalCompositeOperation = 'soft-light';
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.globalCompositeOperation = 'source-over';

  return { canvas: out, dataUrl: out.toDataURL('image/png'), attach: findAttachPoints(out) };
}

function strapColorFromCanvas(c) {
  const ctx = c.getContext('2d');
  const d = ctx.getImageData(0, 0, c.width, Math.min(20, c.height)).data;
  let r=0,g=0,b=0,n=0;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] > 100) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
  }
  if (!n) return '#8b4040';
  return `rgb(${Math.round(r/n*0.85)},${Math.round(g/n*0.85)},${Math.round(b/n*0.85)})`;
}

function hasBuiltInStrap(attach, w, h) {
  const span = attach.right - attach.left;
  return attach.top < h * 0.12 && span < w * 0.55;
}

function drawStraps(svg, attach, strapColor, imgEl) {
  const W = 380, H = 420;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  if (hasBuiltInStrap(attach, attach.width, attach.height)) {
    svg.innerHTML = '';
    return;
  }

  const hookX = W / 2;
  const hookY = HOOK_INSET;
  const scale = attach.width > 0 ? imgEl.offsetWidth / attach.width : 1;
  const attachY = HOOK_INSET;
  const imgLeft = W / 2 - imgEl.offsetWidth / 2 + bagImgOffsetX(imgEl, attach);
  const leftX = imgLeft + attach.left * scale;
  const rightX = imgLeft + attach.right * scale;
  const sw = Math.max(2.2, 2.8 * scale);

  svg.innerHTML = `
    <path d="M ${hookX} ${hookY} C ${hookX} ${hookY + 14} ${leftX} ${attachY + 6} ${leftX} ${attachY + 12}"
          stroke="${strapColor}" stroke-width="${sw}" opacity="0.92"/>
    <path d="M ${hookX} ${hookY} C ${hookX} ${hookY + 14} ${rightX} ${attachY + 6} ${rightX} ${attachY + 12}"
          stroke="${strapColor}" stroke-width="${sw}" opacity="0.92"/>
  `;
}

function escapeAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function createSlot(index) {
  const slot = document.createElement('div');
  slot.className = 'slot';
  slot.innerHTML = `
    <div class="hang-stage">
      <div class="peg">${pegHtml(index)}</div>
      <svg class="straps"></svg>
      <div class="bag-zone">
        <img class="wall-shadow" alt="" hidden />
        <div class="floor-shadow"></div>
        <div class="slot-content"></div>
      </div>
    </div>
    <div class="slot-actions">
      <button type="button" data-change>change</button>
      <button type="button" data-clear>clear</button>
    </div>
  `;

  const zone = slot.querySelector('.bag-zone');
  const content = slot.querySelector('.slot-content');
  const straps = slot.querySelector('.straps');
  const wallShadow = slot.querySelector('.wall-shadow');
  const data = {
    index, name: '', price: '', image: null,
    attach: null, strapColor: '#8b4040',
    phase: Math.random() * Math.PI * 2,
    angle: 0, vel: 0,
  };

  function bindMeta() {
    content.querySelector('.name')?.addEventListener('input', e => { data.name = e.target.value; save(); });
    content.querySelector('.price')?.addEventListener('input', e => { data.price = e.target.value; save(); });
  }

  function renderEmpty() {
    straps.innerHTML = '';
    straps.style.top = '';
    wallShadow.hidden = true;
    zone.classList.remove('sway', 'has-bag');
    zone.style.top = '';
    zone.style.transform = '';
    content.innerHTML = `<label class="empty-slot">+ bag<input type="file" accept="image/*" hidden /></label>`;
    const drop = content.querySelector('.empty-slot');
    const input = content.querySelector('input');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('dragover');
      const f = [...e.dataTransfer.files].find(f => f.type.startsWith('image/'));
      if (f) loadFile(f);
    });
    input.addEventListener('change', () => { if (input.files[0]) loadFile(input.files[0]); input.value = ''; });
  }

  function renderBag() {
    content.innerHTML = `
      <img class="bag-img" src="${data.image}" alt="" />
      <div class="bag-meta">
        <input class="name" placeholder="bag name" value="${escapeAttr(data.name)}" />
        <input class="price" placeholder="$0" value="${escapeAttr(data.price)}" />
      </div>
    `;
    const img = content.querySelector('.bag-img');
    wallShadow.src = data.image;
    wallShadow.hidden = false;
    zone.classList.add('sway');
    bindMeta();
    img.onload = () => {
      const needsBody = !data.attach?.bodyWidth;
      data.attach = enrichAttachFromImage(img, data.attach);
      if (needsBody && data.attach?.bodyWidth) save();
      const stage = slot.querySelector('.hang-stage');
      layoutHang(stage, zone, img, data.attach, straps);
      drawStraps(straps, data.attach, data.strapColor, img);
      applyHangTransform(zone, data);
    };
    if (img.complete) img.onload();
  }

  function loadFile(file) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const cut = removeBackground(img);
      const hung = hangifyImage(cut);
      data.image = hung.dataUrl;
      data.attach = hung.attach;
      data.strapColor = strapColorFromCanvas(cut);
      renderBag();
      save();
    };
    img.src = url;
  }

  slot.querySelector('[data-change]').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = () => { if (input.files[0]) loadFile(input.files[0]); };
    input.click();
  });

  slot.querySelector('[data-clear]').addEventListener('click', () => {
    Object.assign(data, { image: null, name: '', price: '', attach: null, angle: 0, vel: 0 });
    renderEmpty();
    save();
  });

  if (data.image) renderBag();
  else renderEmpty();

  slots.push(data);
  hooksEl.appendChild(slot);
  return data;
}

function applyHangTransform(zone, data) {
  data.angle = (Math.random() - 0.5) * 4;
  data.vel = (Math.random() - 0.5) * 5;
  zone.style.transform = `perspective(900px) rotateX(7deg) rotateZ(${data.angle}deg)`;
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(slots.map(s => ({
      name: s.name, price: s.price, image: s.image,
      attach: s.attach, strapColor: s.strapColor, phase: s.phase,
    }))));
  } catch (_) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

const STIFFNESS = 62;
const DAMPING = 2.6;
const BREEZE = 10;

let lastT = performance.now();
function animate(now) {
  let dt = Math.min(0.05, (now - lastT) * 0.001);
  lastT = now;

  slots.forEach((data, i) => {
    if (!data.image) return;
    const zone = hooksEl.children[i]?.querySelector('.bag-zone');
    const straps = hooksEl.children[i]?.querySelector('.straps');
    if (!zone) return;
    if (data.angle === undefined) { data.angle = 0; data.vel = 0; }

    const breeze = Math.sin(now * 0.00032 + data.phase) * BREEZE
                 + Math.sin(now * 0.00085 + data.phase * 1.6) * BREEZE * 0.35;
    const acc = -STIFFNESS * data.angle - DAMPING * data.vel + breeze;
    data.vel += acc * dt;
    data.angle += data.vel * dt;

    const lean = 7 - Math.abs(data.angle) * 0.12;
    const rot = `perspective(900px) rotateX(${lean}deg) rotateZ(${data.angle}deg)`;
    zone.style.transform = rot;
    if (straps) straps.style.transform = `translateX(-50%) rotateZ(${data.angle * 0.85}deg)`;
  });
  requestAnimationFrame(animate);
}

function layoutRail() {
  railEl.style.width = `${NUM_HOOKS * 440}px`;
}

const saved = load();
layoutRail();
for (let i = 0; i < NUM_HOOKS; i++) {
  const data = createSlot(i);
  if (saved?.[i]?.image) {
    Object.assign(data, saved[i]);
    const slot = hooksEl.children[i];
    const zone = slot.querySelector('.bag-zone');
    const content = slot.querySelector('.slot-content');
    const straps = slot.querySelector('.straps');
    const wallShadow = slot.querySelector('.wall-shadow');
    content.innerHTML = `
      <img class="bag-img" src="${data.image}" alt="" />
      <div class="bag-meta">
        <input class="name" placeholder="bag name" value="${escapeAttr(data.name)}" />
        <input class="price" placeholder="$0" value="${escapeAttr(data.price)}" />
      </div>
    `;
    wallShadow.src = data.image;
    wallShadow.hidden = false;
    zone.classList.add('sway');
    const img = content.querySelector('.bag-img');
    img.onload = () => {
      const needsBody = !data.attach?.bodyWidth;
      data.attach = enrichAttachFromImage(img, data.attach);
      if (needsBody && data.attach?.bodyWidth) save();
      const stage = slot.querySelector('.hang-stage');
      layoutHang(stage, zone, img, data.attach, straps);
      drawStraps(straps, data.attach, data.strapColor, img);
      applyHangTransform(zone, data);
    };
    content.querySelector('.name').addEventListener('input', e => { data.name = e.target.value; save(); });
    content.querySelector('.price').addEventListener('input', e => { data.price = e.target.value; save(); });
    if (img.complete) img.onload();
  }
}

requestAnimationFrame(animate);

(function enableWallDragScroll() {
  let drag = null;
  let suppressClick = false;

  function isInteractive(target) {
    return target.closest('button, input, textarea, a, label.empty-slot');
  }

  wallEl.addEventListener('pointerdown', e => {
    if (e.button !== 0 || isInteractive(e.target)) return;
    drag = { x: e.clientX, scroll: wallEl.scrollLeft };
    wallEl.classList.add('dragging');
    wallEl.setPointerCapture(e.pointerId);
  });

  wallEl.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.x;
    if (Math.abs(dx) > 4) drag.moved = true;
    wallEl.scrollLeft = drag.scroll - dx;
  });

  function endDrag(e) {
    if (!drag) return;
    suppressClick = !!drag.moved;
    drag = null;
    wallEl.classList.remove('dragging');
    wallEl.releasePointerCapture(e.pointerId);
  }

  wallEl.addEventListener('pointerup', endDrag);
  wallEl.addEventListener('pointercancel', endDrag);

  wallEl.addEventListener('click', e => {
    if (!suppressClick) return;
    suppressClick = false;
    e.preventDefault();
    e.stopPropagation();
  }, true);
})();
</script>
</body>
</html>
