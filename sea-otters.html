<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>otters</title>
  <link rel="icon" type="image/png" href="otter-favicon.png" />
  <link rel="apple-touch-icon" href="otter-favicon.png" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; width:100vw; height:100vh; background:#2a6b86; }
    #c { display:block; position:fixed; inset:0; width:100vw; height:100vh; }
    #otter-layer {
      position:fixed; inset:0; pointer-events:none;
      /* clip otters to the frame so they never float onto the paper */
      clip-path: inset(14% 10% 14% 10% round 26px);
    }
    .otter-wrap { position:absolute; will-change:transform; }
    .otter-img {
      position:relative;
      z-index:2;
      display:block;
      width:100%;
      /* ethereal painterly wash + grain, matching the series */
      filter:url(#otterGrain) saturate(0.78) contrast(0.9) brightness(1.06)
             blur(0.4px) drop-shadow(0 4px 8px rgba(10,50,60,0.35));
    }
    /* soft darker patch of water the otter sits in */
    .otter-glow {
      position:absolute;
      z-index:1;
      left:6%; top:14%;
      width:88%; height:80%;
      border-radius:50%;
      background:radial-gradient(ellipse, rgba(12,60,74,0.4) 0%, rgba(12,60,74,0.14) 55%, transparent 74%);
      filter:blur(7px);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="otter-layer"></div>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="otterGrain" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" result="noise"/>
    <feColorMatrix in="noise" type="matrix"
      values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0.3 0.3 0.3 0 0" result="mono"/>
    <feComponentTransfer in="mono" result="fade">
      <feFuncA type="linear" slope="0.28" intercept="0"/>
    </feComponentTransfer>
    <feComposite in="fade" in2="SourceAlpha" operator="in" result="maskedNoise"/>
    <feMerge>
      <feMergeNode in="SourceGraphic"/>
      <feMergeNode in="maskedNoise"/>
    </feMerge>
  </filter>
</svg>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

function resize() {
  // render at lower resolution when embedded in the gallery — big perf win
  const dpr = Math.min(devicePixelRatio, window.self === window.top ? 2 : 1.25);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const frag = `
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;    // smoothed cursor, 0..1 (y up)
uniform float uMouseVel;
uniform vec2  uOtterPos[8];   // otter centers, 0..1 (y up)
uniform vec2  uOtterInfo[8];  // x: radius scale (uv units), y: active 0/1

vec2 hash2(vec2 p) {
  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
  return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
}
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(dot(hash2(i + vec2(0,0)), f - vec2(0,0)),
        dot(hash2(i + vec2(1,0)), f - vec2(1,0)), u.x),
    mix(dot(hash2(i + vec2(0,1)), f - vec2(0,1)),
        dot(hash2(i + vec2(1,1)), f - vec2(1,1)), u.x), u.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = p * 2.02 + vec2(11.3, 7.1);
    a *= 0.5;
  }
  return v;
}
float grain(vec2 p) {
  return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
}
float sdRoundRect(vec2 p, vec2 halfSize, float r) {
  vec2 q = abs(p) - halfSize + r;
  return length(max(q, 0.0)) + min(max(q.x, q.y), 0.0) - r;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  float aspect = uRes.x / uRes.y;
  vec2 p = vec2(uv.x * aspect, uv.y);
  vec2 m = vec2(uMouse.x * aspect, uMouse.y);

  // ---- cursor drags the water: gentle push + swirl near the pointer ----
  vec2 toM = p - m;
  float dM = length(toM);
  float lens = exp(-dM * dM * 8.0);
  vec2 swirl = vec2(-toM.y, toM.x);
  vec2 warp = (toM * -0.15 + swirl * 0.35) * lens * (0.5 + uMouseVel * 3.0);

  // ---- rolling sea surface: layered wave fields, faster near the "camera" ----
  float t = uTime * 0.09;
  // perspective-ish: compress waves toward the top (horizon), stretch at bottom
  float persp = mix(2.6, 1.0, uv.y);
  vec2 q = vec2(p.x, p.y * persp) * 3.2 + warp;

  vec2 w1 = vec2(fbm(q + vec2(t, t * 0.3)),
                 fbm(q + vec2(-t * 0.6, t * 0.9) + 5.2));
  float swell = fbm(q * 0.5 + w1 * 0.8 + vec2(0.0, -t * 1.4)); // big slow swells
  float ripple = fbm(q * 1.6 + w1 * 1.4 + vec2(t * 1.1, -t * 2.0)); // small chop
  float h = swell * 0.7 + ripple * 0.5;

  // ---- watercolor sea palette (dusty blues, like brushed pigment) ----
  vec3 deep  = vec3(0.278, 0.400, 0.494); // dusty slate-blue pooling
  vec3 mid   = vec3(0.502, 0.620, 0.690); // main wash
  vec3 crest = vec3(0.663, 0.761, 0.800); // pale lifted wash
  vec3 sage  = vec3(0.557, 0.635, 0.500); // reflected green (grass/kelp)
  vec3 moss  = vec3(0.447, 0.557, 0.431); // deeper green
  vec3 cream = vec3(0.937, 0.914, 0.835); // warm paper cream

  vec3 col = mix(deep, mid, smoothstep(-0.35, 0.15, h));
  col = mix(col, crest, smoothstep(0.18, 0.5, h));

  // ---- watercolor mottling: big soft blotches of uneven pigment ----
  float blot = fbm(p * 1.4 + vec2(31.0, 17.0) + w1 * 0.4 - t * 0.2);
  col = mix(col, deep, smoothstep(0.05, 0.4, blot) * 0.55);
  col = mix(col, crest, smoothstep(-0.05, -0.4, blot) * 0.5);

  // ---- green reflections: sage patches drifting through the water ----
  float gf = fbm(p * 1.0 + vec2(7.7, 3.1) + w1 * 0.6 + t * 0.15);
  float greenAmt = smoothstep(0.02, 0.32, gf);
  // greens a touch stronger toward the top and the sides, like reflected banks
  float bankMask = 0.45
                 + smoothstep(0.45, 0.95, uv.y) * 0.4
                 + exp(-pow((uv.x - 0.06 * aspect) * 2.0, 2.0)) * 0.3
                 + exp(-pow((uv.x - aspect * 0.94) * 2.0, 2.0)) * 0.3;
  col = mix(col, sage, greenAmt * min(1.0, bankMask) * 0.6);
  col = mix(col, moss, smoothstep(0.25, 0.5, gf) * min(1.0, bankMask) * 0.35);

  // ---- kelp: dark olive strands swaying just under the surface ----
  // strand field squashed vertically -> long wavy vertical fronds
  float sway = sin(p.y * 2.6 + t * 1.6) * 0.035 + sin(p.y * 5.2 - t * 1.1) * 0.015;
  vec2 kq = vec2((p.x + sway) * 4.5, p.y * 0.85) * 2.0 + w1 * 0.1;
  float kf = fbm(kq);
  // gradient-normalized contours -> crisp wavy vertical fronds
  vec2 ke = vec2(0.03, 0.0);
  vec2 kgrad = vec2(fbm(kq + ke.xy) - fbm(kq - ke.xy),
                    fbm(kq + ke.yx) - fbm(kq - ke.yx)) / (2.0 * ke.x);
  float kd = abs(kf - 0.22) / max(length(kgrad), 0.35);
  float strand = smoothstep(0.15, 0.05, kd);
  // kelp grows in beds: loose patches, denser toward the lower corners
  float bed = smoothstep(-0.22, 0.1, fbm(p * 1.1 + vec2(15.5, 8.8)))
            * (0.3 + smoothstep(0.6, 0.05, uv.y) * 0.7)
            * (0.45 + exp(-pow((uv.x - 0.08 * aspect) * 1.8, 2.0)) * 0.6
                    + exp(-pow((uv.x - aspect * 0.92) * 1.8, 2.0)) * 0.6);
  bed = min(1.0, bed);
  vec3 kelpDk = vec3(0.239, 0.345, 0.243); // deep olive
  vec3 kelpLt = vec3(0.396, 0.502, 0.331); // lit frond
  col = mix(col, kelpDk, strand * bed * 0.8);
  // faint lighter mid-ribs inside the strands
  float rib = smoothstep(0.032, 0.012, kd);
  col = mix(col, kelpLt, rib * bed * 0.5);
  // soft dark bloom under each bed, like depth beneath the canopy
  col = mix(col, deep * 0.8, smoothstep(0.25, 0.7, bed) * 0.22);

  // ---- hand-drawn ripple strokes: thin curved white brush lines ----
  // stretched horizontally so they read as strokes, warped by the swell
  // squashed hard in x -> the contour band stretches into long curved arcs
  vec2 rq = vec2(p.x * 0.55, p.y * 4.6) * 2.0 + w1 * 0.7 + vec2(t * 0.5, -t * 0.9);
  float rip = fbm(rq);
  // gradient-normalized distance to the isocontour -> uniform thin line width
  vec2 e = vec2(0.03, 0.0);
  vec2 rgrad = vec2(fbm(rq + e.xy) - fbm(rq - e.xy),
                    fbm(rq + e.yx) - fbm(rq - e.yx)) / (2.0 * e.x);
  float dLine = abs(rip - 0.30) / max(length(rgrad), 0.35);
  float stroke = smoothstep(0.035, 0.012, dLine);
  // break the long arcs into dashes, elongated the same way
  float patchy = smoothstep(-0.3, 0.12, fbm(vec2(p.x * 0.7, p.y * 1.6) + vec2(4.2, 9.9) + t * 0.1));
  col = mix(col, vec3(0.925, 0.945, 0.945), stroke * patchy * 0.85);

  // finer, fainter secondary arcs at a different drift
  vec2 rq2 = vec2(p.x * 0.7, p.y * 5.6) * 2.2 + w1 * 0.9 - vec2(t * 0.4, t * 1.1);
  float rip2 = fbm(rq2);
  vec2 rgrad2 = vec2(fbm(rq2 + e.xy) - fbm(rq2 - e.xy),
                     fbm(rq2 + e.yx) - fbm(rq2 - e.yx)) / (2.0 * e.x);
  float dLine2 = abs(rip2 - 0.30) / max(length(rgrad2), 0.35);
  float stroke2 = smoothstep(0.028, 0.01, dLine2);
  col = mix(col, cream, stroke2 * patchy * 0.55);

  // ---- soft sun-warmth: gentle cream lift, watercolor style (no sparkle) ----
  float sunBand = exp(-pow((uv.x - 0.5 * aspect) * 1.4, 2.0));
  col = mix(col, cream, sunBand * smoothstep(0.6, 1.0, uv.y) * 0.18);

  // ---- cursor wake: a lifted lighter wash trailing the pointer ----
  col = mix(col, crest, lens * (0.25 + uMouseVel * 0.5));
  col = mix(col, vec3(0.925, 0.945, 0.945), lens * lens * uMouseVel * 0.4);

  // ---- otter ripples: wobbly concentric brush-stroke rings ----
  for (int i = 0; i < 8; i++) {
    if (uOtterInfo[i].y < 0.5) continue;
    vec2 op = vec2(uOtterPos[i].x * aspect, uOtterPos[i].y);
    float dO = length(p - op);
    float s = uOtterInfo[i].x;
    if (dO > s * 2.6) continue;
    // hand-drawn wobble so rings aren't perfect circles
    float wob = fbm(p * 5.0 + float(i) * 3.7) * s * 0.38;
    float ring = 0.0;
    for (int j = 0; j < 3; j++) {
      // each ring breathes gently at its own pace
      float r = s * (0.72 + 0.5 * float(j))
              * (1.0 + 0.05 * sin(uTime * 0.7 + float(j) * 1.9 + float(i) * 2.3));
      ring += smoothstep(s * 0.10, s * 0.03, abs(dO + wob - r))
            * (1.0 - float(j) * 0.3);
    }
    // dashes: rings broken like quick brush marks
    float dash = smoothstep(-0.05, 0.25, fbm(p * 3.6 + vec2(float(i) * 1.3, 6.1) + t * 0.2));
    col = mix(col, vec3(0.925, 0.945, 0.945), min(ring, 1.0) * dash * 0.45);
  }

  // ---- painterly paper grain (matches the series) ----
  vec2 gp = gl_FragCoord.xy;
  float gr = grain(gp) * 0.5 + grain(gp * 1.7 + 19.0) * 0.5;
  float tone = dot(col, vec3(0.333));
  col += (gr - 0.5) * 0.09 * (0.5 + 0.5 * (1.0 - abs(tone - 0.5)));
  col.r += (grain(gp + 5.0) - 0.5) * 0.015;
  col.b += (grain(gp + 21.0) - 0.5) * 0.02;

  // soft vignette
  col *= 1.0 - 0.10 * length(uv - 0.5);

  // ---- centered rounded-rect frame on cream paper (matches the series) ----
  vec2 center = vec2(0.5 * aspect, 0.5);
  float d = sdRoundRect(p - center, vec2(0.40 * aspect, 0.36), 0.06);
  // soft, slightly noisy transition band -> hand-feathered edge
  float edge = 0.018 + fbm(p * 6.0 + 20.0) * 0.005;
  float frameMask = smoothstep(edge, -edge, d);
  vec3 paper = vec3(0.945, 0.937, 0.914);
  paper += (gr - 0.5) * 0.05;
  col = mix(paper, col, frameMask);

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER,
  'attribute vec2 a; void main(){ gl_Position = vec4(a, 0.0, 1.0); }'));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aLoc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

const uRes      = gl.getUniformLocation(prog, 'uRes');
const uTime     = gl.getUniformLocation(prog, 'uTime');
const uMouse    = gl.getUniformLocation(prog, 'uMouse');
const uMouseVel = gl.getUniformLocation(prog, 'uMouseVel');
const uOtterPos  = gl.getUniformLocation(prog, 'uOtterPos');
const uOtterInfo = gl.getUniformLocation(prog, 'uOtterInfo');
const MAX_SHADER_OTTERS = 8;
const otterPosArr  = new Float32Array(MAX_SHADER_OTTERS * 2);
const otterInfoArr = new Float32Array(MAX_SHADER_OTTERS * 2);

let tx = 0.5, ty = 0.5, cx = 0.5, cy = 0.5, vel = 0;
window.addEventListener('mousemove', e => {
  tx = e.clientX / window.innerWidth;
  ty = 1 - e.clientY / window.innerHeight;
});

// ================= floating otters =================
const otterLayer = document.getElementById('otter-layer');
const otters = [];
const otterImg = new Image();
otterImg.src = 'otter.png';

// two kinds of floaters: single otters (most clicks) and hand-holding pairs
const OTTER_TYPES = [
  { src: 'otter-single.png', w: 100, weight: 3 },
  { src: 'otter.png',        w: 130, weight: 1 },
];

function pickOtterType() {
  const total = OTTER_TYPES.reduce((s, k) => s + k.weight, 0);
  let r = Math.random() * total;
  for (const k of OTTER_TYPES) { r -= k.weight; if (r <= 0) return k; }
  return OTTER_TYPES[0];
}

function spawnOtter(px, py) {
  const type = pickOtterType();
  const el = document.createElement('div');
  el.className = 'otter-wrap';
  el.innerHTML = `<div class="otter-glow"></div><img class="otter-img" src="${type.src}">`;
  const angle = Math.random() * Math.PI * 2;      // drift heading
  const otter = {
    el, x: px, y: py, w: type.w,
    drift: 5 + Math.random() * 7,                 // px/sec, slow
    driftAng: angle,
    baseRot: (Math.random() - 0.5) * 60,          // resting orientation, deg
    rockPhase: Math.random() * Math.PI * 2,
    rockSpeed: 0.5 + Math.random() * 0.4,
    bobPhase: Math.random() * Math.PI * 2,
    size: 0.85 + Math.random() * 0.5,
    scale: 0,
  };
  otterLayer.appendChild(el);
  otters.push(otter);
}

function frameBounds() {
  const W = window.innerWidth, H = window.innerHeight;
  return { x0: W * 0.10, x1: W * 0.90, y0: H * 0.14, y1: H * 0.86 };
}

window.addEventListener('click', e => {
  const fb = frameBounds();
  if (e.clientX > fb.x0 + 16 && e.clientX < fb.x1 - 16 &&
      e.clientY > fb.y0 + 16 && e.clientY < fb.y1 - 16)
    spawnOtter(e.clientX, e.clientY);
});

let otterLast = performance.now();
function updateOtters(now) {
  let dt = (now - otterLast) * 0.001;
  otterLast = now;
  if (dt > 0.05) dt = 0.05;
  const W = window.innerWidth, H = window.innerHeight;
  const tsec = now * 0.001;

  for (const o of otters) {
    // slow drift across the open sea, gently wandering heading
    o.driftAng += Math.sin(tsec * 0.2 + o.bobPhase) * dt * 0.4;
    o.x += Math.cos(o.driftAng) * o.drift * dt;
    o.y += Math.sin(o.driftAng) * o.drift * dt * 0.6; // less vertical drift

    // wrap around the frame edges — open water inside the picture
    const fb = frameBounds();
    const mgn = 110;
    if (o.x < fb.x0 - mgn) o.x = fb.x1 + mgn; else if (o.x > fb.x1 + mgn) o.x = fb.x0 - mgn;
    if (o.y < fb.y0 - mgn) o.y = fb.y1 + mgn; else if (o.y > fb.y1 + mgn) o.y = fb.y0 - mgn;

    o.scale = Math.min(1, o.scale + dt * 2.5);
    o.bobPhase += dt * 1.3;
    o.rockPhase += dt * o.rockSpeed;

    // bob with the swell + rock slowly like something afloat
    const bob = Math.sin(o.bobPhase) * 4;
    const rot = o.baseRot + Math.sin(o.rockPhase) * 7;
    const sway = Math.cos(o.rockPhase * 0.8) * 3;

    const w = o.w;
    o.el.style.width = w + 'px';
    o.el.style.left = (o.x - w / 2 + sway) + 'px';
    o.el.style.top  = (o.y - w * 0.64 + bob) + 'px';
    o.el.style.transformOrigin = '50% 50%';
    o.el.style.transform = `rotate(${rot}deg) scale(${o.size * o.scale})`;
  }
  requestAnimationFrame(updateOtters);
}
requestAnimationFrame(updateOtters);

const t0 = performance.now();
function render(now) {
  const dx = tx - cx, dy = ty - cy;
  cx += dx * 0.07;
  cy += dy * 0.07;
  vel += (Math.min(Math.hypot(dx, dy) * 4, 1) - vel) * 0.08;

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, (now - t0) * 0.001);
  gl.uniform2f(uMouse, cx, cy);
  gl.uniform1f(uMouseVel, vel);

  // feed otter positions/sizes to the shader for the ripple rings
  const W = window.innerWidth, H = window.innerHeight;
  otterInfoArr.fill(0);
  for (let i = 0; i < MAX_SHADER_OTTERS; i++) {
    const o = otters[otters.length - 1 - i]; // most recent otters
    if (!o) break;
    otterPosArr[i * 2]     = o.x / W;
    otterPosArr[i * 2 + 1] = 1 - o.y / H;
    // radius scale in uv units, tied to the otter's on-screen size
    otterInfoArr[i * 2]     = (o.w * o.size * o.scale * 0.55) / H;
    otterInfoArr[i * 2 + 1] = o.scale > 0.05 ? 1 : 0;
  }
  gl.uniform2fv(uOtterPos, otterPosArr);
  gl.uniform2fv(uOtterInfo, otterInfoArr);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
