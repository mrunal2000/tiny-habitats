<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulge Effect</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; width:100vw; height:100vh; background:#fff; }
    #c { display:block; position:fixed; inset:0; width:100vw; height:100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const vert = `
attribute vec2 a;
varying vec2 vUv;
void main() {
  vUv = a * 0.5 + 0.5;
  gl_Position = vec4(a, 0.0, 1.0);
}
`;

const frag = `
precision highp float;
varying vec2 vUv;
uniform vec2  uRes;
uniform vec2  uImgRes;
uniform vec2  uMouse;
uniform float uStrength;
uniform sampler2D uImg;

void main() {
  vec2 uv = vUv;
  uv.y = 1.0 - uv.y;

  float sAR = uRes.x / uRes.y;
  float iAR = uImgRes.x / uImgRes.y;
  vec2 scale = sAR > iAR ? vec2(iAR/sAR, 1.0) : vec2(1.0, sAR/iAR);
  scale *= 0.88;

  vec2 imgUV = (uv - 0.5) / scale + 0.5;
  if (imgUV.x < 0.0 || imgUV.x > 1.0 || imgUV.y < 0.0 || imgUV.y > 1.0) {
    gl_FragColor = vec4(1.0); return;
  }

  float radius   = 0.22;
  float strength = 1.1 * uStrength;
  vec2  toFrag   = uv - uMouse;
  toFrag.x      *= sAR;
  float dist     = length(toFrag);
  if (dist < radius) {
    float norm  = dist / radius;
    float bulge = pow(1.0 - norm * norm, 2.0);
    toFrag.x   /= sAR;
    imgUV      -= toFrag * bulge * strength;
  }

  gl_FragColor = vec4(texture2D(uImg, imgUV).rgb, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, `
  attribute vec2 a; varying vec2 vUv;
  void main(){ vUv = a*0.5+0.5; gl_Position=vec4(a,0,1); }
`));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aLoc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

const uRes      = gl.getUniformLocation(prog, 'uRes');
const uImgRes   = gl.getUniformLocation(prog, 'uImgRes');
const uFrameRes = gl.getUniformLocation(prog, 'uFrameRes');
const uMouse    = gl.getUniformLocation(prog, 'uMouse');
const uStrength = gl.getUniformLocation(prog, 'uStrength');

let imgTex = null, frameTex = null;
let imgLoaded = false, frameLoaded = false;

function loadTex(src, hasAlpha, onLoad) {
  const tex = gl.createTexture();
  const img = new Image();
  img.crossOrigin = '';
  img.onload = () => {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    const fmt = hasAlpha ? gl.RGBA : gl.RGB;
    gl.texImage2D(gl.TEXTURE_2D, 0, fmt, fmt, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    onLoad(tex, img.naturalWidth, img.naturalHeight);
  };
  img.src = src + '?v=' + Date.now();
}

loadTex('image.jpg', false, (tex, w, h) => {
  imgTex = tex;
  gl.useProgram(prog);
  gl.uniform2f(uImgRes, w, h);
  imgLoaded = true;
  if (frameLoaded) requestAnimationFrame(render);
});

loadTex('frame.png', true, (tex, w, h) => {
  frameTex = tex;
  gl.useProgram(prog);
  gl.uniform2f(uFrameRes, w, h);
  frameLoaded = true;
  if (imgLoaded) requestAnimationFrame(render);
});

let tx = 0.5, ty = 0.5, cx = 0.5, cy = 0.5;
let strength = 0, targetStrength = 0;

document.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  tx = (e.clientX - r.left) / r.width;
  ty = (e.clientY - r.top)  / r.height;
  targetStrength = 1.0;
});
document.addEventListener('mouseleave', () => { targetStrength = 0; });

let running = false;
function render() {
  running = true;
  cx += (tx - cx) * 0.07;
  cy += (ty - cy) * 0.07;
  strength += (targetStrength - strength) * 0.05;

  // Bind image to unit 0
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, imgTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'uImg'), 0);

  // Bind frame to unit 1
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, frameTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'uFrame'), 1);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform2f(uMouse, cx, cy);
  gl.uniform1f(uStrength, strength);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
</script>
</body>
</html>
